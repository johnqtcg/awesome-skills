site_name: awesome-skills
site_url: https://johnqtcg.github.io/awesome-skills/
site_description: >-
  Production-ready Claude Code Skills with design rationale,
  quantitative evaluation, golden test fixtures, and end-to-end
  engineering workflow integration.
site_author: johnqtcg
repo_url: https://github.com/johnqtcg/awesome-skills
repo_name: johnqtcg/awesome-skills
edit_uri: edit/main/

docs_dir: docs
site_dir: site

theme:
  name: material
  language: en
  custom_dir: docs/overrides
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.indexes
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit
    - toc.follow
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: purple
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  icon:
    repo: fontawesome/brands/github

hooks:
  - hooks/set_landing_templates.py

plugins:
  - search:
      separator: '[\s\-\.\u3000\u3001\u3002\uff0c]+'
  - minify:
      minify_html: true

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - toc:
      permalink: true
  - tables
  - attr_list
  - md_in_html

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/johnqtcg/awesome-skills
  generator: false

extra_css:
  - assets/stylesheets/custom-theme.css
  - assets/stylesheets/landing-page.css
  - assets/stylesheets/section-pages.css
extra_javascript:
  - assets/javascripts/landing-page.js

copyright: Copyright &copy; 2026 johnqtcg — MIT License

