base: main
reviewers: "alice,bob"
labels: ""  # comma-separated GitHub labels to apply (e.g., "bug,priority/high")
docs_status: yes
compat_status: compatible
timeout: 1200  # seconds, per command
create_pr: false
dry_run: false
update_existing_pr: true

# Prefer per-run CLI flags for these fields so each PR contains real context.
problem: ""
approach: ""
risk: ""
rollback: ""
monitoring: ""
migration_notes: ""

check_cmd:
  - make test
  - make lint
  - go test ./...

quality:
  enabled: true

security_tools:
  enabled: true

branch_protection:
  enabled: true
  require_pr_reviews: true
  require_status_checks: true
  required_checks:
    - unit-test
    - lint

secret_scan:
  enabled: true
  # Empty lists are the secure defaults: scan all added text lines and paths.
  include_extensions: []
  exclude_paths: []
  allow_patterns:
    - "(?i)(dummy|example|placeholder|redacted)"

conflict_scan:
  enabled: true
  scan_changed_files_only: true
  include_extensions:
    - .go
    - .py
    - .yaml
    - .yml
    - .json
    - .md
  exclude_paths:
    - "^vendor/"
